services:
  # 1. Python Backend
  - type: web
    name: deep-technology-agents-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
        
  # 2. React Frontend
  - type: web
    name: deep-technology-agents-ui
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: deep-technology-agents-backend
          envVarKey: RENDER_EXTERNAL_URL
